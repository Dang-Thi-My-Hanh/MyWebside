
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyWebside</title>
    <link rel="stylesheet" href="style.css">
    <style>       
        * 
        {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            
            margin: 0;
            padding: 0;
             
            height: 100vh -70px; /* Chiều cao của trang web là toàn bộ màn hình */
            background-image: url("images/nen.jpg");
            background-size: cover; /* Đảm bảo ảnh nền phủ kín màn hình */
            background-position: center; /* Căn giữa ảnh nền */
            background-repeat: no-repeat; /* Không lặp lại ảnh nền */
            font-family: Arial, sans-serif;
        }
        /*Thanh tiêu đề*/
        .navbar {           
            background-color: #a8e5f571, #f9b8da72;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            .brand-name {
                align-items: center;
                font-size: 55px; /* Kích thước chữ */
                line-height: 1; /* Cao hơn cho dòng */
                color: rgba(219, 30, 30, 0.689); /* Màu chữ đỏ */
                font-weight: bold; /* Làm chữ đậm hơn */
                text-shadow:  
                   2px 2px 0 rgba(254, 250, 250, 0.5),
                   5px 5px 0 rgba(255, 254, 254, 0);

            }

        }

        .brand-name {
            font-size: 24px;
            font-weight: bold;
            color: #5edbec;
        }

        .nav-list {
            list-style-type: none;
            display: flex;
            align-items: center;
        }

        .nav-list li {
            margin: 0 20px;
        }

        .nav-list a {
            text-decoration: none;
            color: #000;
            font-size: 18px;
            font-weight: bold;
            position: relative;
        }

        .nav-list a:hover {
            color: #00b3cc;
        }

        .hero-section {
            text-align: center;
            padding: 60px 20px;
            background: #e0f7fa;
        }

        .hero-section h1 {
            font-size: 36px;
            color: #00b3cc;
            margin-bottom: 20px;
        }

        .hero-section p {
            font-size: 18px;
            color: #333;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
        }
        
        
        .container {
            margin: 0; /* Bỏ margin mặc định */
            height: 100vh; /* Chiều cao bằng chiều cao màn hình */ 
            display: flex;                 
            flex-direction: column; /* Đặt theo chiều dọc */
            align-items: center; /* Căn giữa theo chiều dọc */
            justify-content: center;
        }    
          
        .info-container {
            width: 75%; /* Chiều rộng khung */
            background-color: #fcf4f4; /* Màu nền cho khung nội dung */
            border-radius: 10px; /* Bo góc cho khung */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); /* Đổ bóng cho khung */
            padding: 20px; /* Khoảng cách bên trong khung */
            display: flex; /* Sử dụng flexbox cho nội dung bên trong */
            flex-direction: row; /* Đặt theo chiều ngang */
            align-items: center; /* Căn giữa theo chiều dọc */
            justify-content: space-between; /* Căn đều khoảng cách giữa nội dung và hình ảnh */
            margin: 10px auto; /* Căn giữa khung */
        } 
        .image-container {
            display: flex; /* Sử dụng flexbox để căn giữa hình ảnh */
            align-items: center; /* Căn giữa hình ảnh theo chiều dọc */
            width: 40%; /* Chiếm 40% chiều rộng khung */
        }
        .text {
            font-size: 24px;
            width: 60%; /* Chiếm 60% chiều rộng khung */
            display: flex; /* Sử dụng flexbox cho text-container */
            flex-direction: column; /* Đặt theo chiều dọc */
            align-items: center; /* Căn phải cho nội dung văn bản */
            justify-content: center; /* Căn giữa nội dung theo chiều dọc */
        }
        .image-container img {
            width: 90%; /* Ảnh chiếm 100% chiều rộng của container */
            height: auto; /* Đảm bảo tỷ lệ khung hình */
            padding: 10px 0; /* Khoảng cách giữa ảnh và viền */
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo-container">
            <img src="images\logo.png" alt="CaChep Logo"  style="width:35px; height:auto; ">
            <span class="brand-name">CARP</span>
        </div>
        <ul class="nav-list">
            <li><a href="index.html">HOMEPAGE</a></li>
            <li><a href="intruduce.html">INTRODUCE</a></li>
            <li><a href="contact.html">CONTACT</a></li>
        </ul>       
    </nav>
    <div>
        <img src="images\logo2.png" alt="Ảnh giới thiệu">
        
    </div>
</body>
</html>
